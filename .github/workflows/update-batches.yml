name: Update Batches

on:
  schedule:
    # Every 2 hours
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-batches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Latest Data
        run: |
          curl -L -s \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          --connect-timeout 30 \
          --max-time 60 \
          "https://api.penxpencil.com/v3/return/pw-old-and-new-batches.php" -o batches.json

      - name: Shuffle Data Array
        run: |
          node << 'EOF'
          const fs = require('fs');

          const file = 'batches.json';
          const json = JSON.parse(fs.readFileSync(file, 'utf8'));

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [array[i], array[j]] = [array[j], array[i]];
            }
          }

          if (json.success && Array.isArray(json.data)) {
            shuffle(json.data);
          }

          fs.writeFileSync(
            file,
            JSON.stringify(json, null, 2)
          );

          console.log(`Shuffled ${json.data?.length || 0} batches`);
          EOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add batches.json

          if git diff --staged --quiet; then
            echo "No changes found"
          else
            git commit -m "Auto update batches"
            git push
          fi
